<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成绩监测系统 - 个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            font-size: 16px;
            line-height: 1.5;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .header .user-info span {
            font-weight: 500;
            color: #333;
        }
        .header a {
            text-decoration: none;
            color: #667eea;
            font-weight: 500;
            padding: 8px 20px;
            border: 2px solid #667eea;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .header a:hover {
            background: #667eea;
            color: white;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: fadeInUp 0.5s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }
        .card h3 {
            font-size: 22px;
            margin-bottom: 25px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .card h3::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }
        .form-group { margin: 20px 0; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        input::placeholder { color: #aaa; }
        button {
            padding: 12px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }
        button:active { transform: translateY(0); }
        button.stop {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        button.stop:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        .result {
            margin: 20px 0;
            padding: 16px 20px;
            border-radius: 10px;
            font-weight: 500;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .success {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            color: #0c5238;
        }
        .error {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            color: #721c24;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 12px;
            text-align: left;
            font-weight: 500;
            font-size: 14px;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #f0f0f0;
            color: #555;
            font-size: 14px;
        }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #f8f9ff; }
        .status-box {
            margin: 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            border-radius: 10px;
            color: #4a5568;
        }
        .status-box ul {
            list-style: none;
            padding: 0;
        }
        .status-box li {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .status-box li::before {
            content: '●';
            color: #667eea;
        }
        .status-box li:last-child { border-bottom: none; }
        #monitorForm button {
            margin-right: 10px;
        }
        .new-grade {
            background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%);
            font-weight: 600;
        }
        .grade-change {
            color: #f5576c;
            font-weight: 600;
        }
        .previous-grade {
            color: #999;
            font-size: 12px;
            text-decoration: line-through;
        }
        .hidden { display: none; }
        .reset-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
        }
        .reset-btn:hover {
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }
        
        /* 响应式设计 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .header {
                padding: 15px 20px;
                flex-direction: column;
                text-align: center;
                gap: 10px;
            }
            
            .header h1 {
                font-size: 22px;
                margin-bottom: 5px;
            }
            
            .header .user-info {
                flex-direction: column;
                gap: 10px;
                width: 100%;
            }
            
            .header a {
                width: 100%;
                text-align: center;
                padding: 10px;
            }
            
            .card {
                padding: 20px;
                margin-bottom: 20px;
            }
            
            .card h3 {
                font-size: 18px;
                margin-bottom: 20px;
            }
            
            .form-group {
                margin: 15px 0;
            }
            
            input {
                padding: 12px 14px;
                font-size: 14px;
            }
            
            button {
                padding: 12px 24px;
                font-size: 14px;
                width: 100%;
                margin-bottom: 10px;
            }
            
            #monitorForm button,
            #getGradesBtn + button {
                margin-right: 0;
            }
            
            table {
                font-size: 12px;
            }
            
            th, td {
                padding: 8px;
            }
            
            /* 表格横向滚动 */
            #gradesTable {
                overflow-x: auto;
                border-radius: 10px;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            }
            
            #gradesTable table {
                border-radius: 0;
            }
            
            .status-box {
                padding: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 18px;
            }
            
            .card h3 {
                font-size: 16px;
            }
            
            input {
                padding: 10px 12px;
                font-size: 13px;
            }
            
            button {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>飞翔的羊羊成绩监测系统</h1>
            <div class="user-info">
                <span>欢迎，{{ username }}</span>
                <a href="{{ url_for('user_logout') }}">退出登录</a>
            </div>
        </div>

    <!-- 教务系统账号输入模块 -->
    <div class="card" id="accountCard">
        <h3>教务系统账号</h3>
        <form id="accountForm">
            <div class="form-group">
                <label>教务系统账号</label>
                <input type="text" id="jw_username" required placeholder="请输入教务系统账号">
            </div>
            <div class="form-group">
                <label>教务系统密码</label>
                <input type="password" id="jw_password" required placeholder="请输入教务系统密码">
            </div>
        </form>
        <button type="button" id="resetAccountBtn" class="reset-btn hidden">重置教务系统账号</button>
    </div>

    <!-- 获取成绩模块 -->
    <div class="card">
        <h3>1. 获取当前成绩</h3>
        <button type="button" id="getGradesBtn">获取成绩</button>
        <button type="button" id="downloadScheduleBtn">下载个人课程表</button>
        <div id="gradesResult" class="result"></div>
        <div id="gradesTable"></div>
    </div>

    <!-- 监测成绩模块 -->
    <div class="card">
        <h3>2. 开启成绩监测</h3>
        <div class="form-group">
            <label>接收通知邮箱（默认使用注册邮箱）</label>
            <input type="email" id="monitor_email" placeholder="可选，留空则使用注册邮箱">
        </div>
        <button type="button" id="startMonitorBtn">启动监测</button>
        <button type="button" id="stopMonitorBtn" class="stop">停止监测</button>
        <div id="monitorResult" class="result"></div>
    </div>

    <!-- 监测状态模块 -->
    <div class="card">
        <h3>3. 当前监测状态</h3>
        <div id="monitorStatus" class="status-box">
            加载中...
        </div>
    </div>

    <script>
        // 存储账号信息
        let savedAccount = { username: '', password: '' };
        
        // 页面加载完成后执行
        document.addEventListener('DOMContentLoaded', function() {
            // 自动填充注册邮箱
            document.getElementById('monitor_email').value = '{{ user_email }}';
            
            // 检查是否有保存的账号
            {% if saved_account %}
                console.log('检测到保存的账号信息，自动填充');
                document.getElementById('jw_username').value = '{{ saved_account.username }}';
                document.getElementById('jw_password').value = '{{ saved_account.password }}';
                savedAccount = { 
                    username: '{{ saved_account.username }}', 
                    password: '{{ saved_account.password }}'
                };
                // 自动隐藏账号输入框
                hideAccountInputs();
            {% endif %}
        });

        // 获取账号密码
        function getAccountData() {
            const username = document.getElementById('jw_username').value;
            const password = document.getElementById('jw_password').value;
            return { username, password };
        };

        // 隐藏账号输入框，显示重置按钮
        function hideAccountInputs() {
            document.getElementById('accountForm').classList.add('hidden');
            document.getElementById('resetAccountBtn').classList.remove('hidden');
        }

        // 显示账号输入框，隐藏重置按钮
        function showAccountInputs() {
            document.getElementById('accountForm').classList.remove('hidden');
            document.getElementById('resetAccountBtn').classList.add('hidden');
        }

        // 重置教务系统账号
        document.getElementById('resetAccountBtn').addEventListener('click', () => {
            document.getElementById('jw_username').value = '';
            document.getElementById('jw_password').value = '';
            savedAccount = { username: '', password: '' };
            showAccountInputs();
        });

        // 获取成绩
        document.getElementById('getGradesBtn').addEventListener('click', async () => {
            const { username, password } = getAccountData();
            if (!username || !password) {
                alert('请先填写教务系统账号和密码');
                return;
            }

            const formData = new FormData();
            formData.append('jw_username', username);
            formData.append('jw_password', password);

            const resultEl = document.getElementById('gradesResult');
            const tableEl = document.getElementById('gradesTable');
            
            try {
                const res = await fetch('/grade/api/get_grades', {
                    method: 'POST',
                    body: formData
                });
                
                // 检查响应状态
                if (!res.ok) {
                    throw new Error(`HTTP错误: ${res.status}`);
                }
                
                const data = await res.json();
                
                if (data.success) {
                    resultEl.className = 'result success';
                    resultEl.textContent = `获取成功！共 ${data.grades.length} 门课程`;
                    
                    // 保存账号信息并隐藏输入框
                    savedAccount = { username, password };
                    hideAccountInputs();
                    
                    // 生成成绩表格
                    let table = '<table><thead><tr><th>课程名称</th><th>成绩</th><th>学分</th><th>课程性质</th><th>课程类别</th></tr></thead><tbody>';
                    data.grades.forEach(course => {
                        const isNew = course.is_new;
                        const hasChange = course.previous_grade !== undefined;
                        let gradeDisplay = course.grade || '未录入';
                        
                        if (hasChange) {
                            gradeDisplay = `<span class="previous-grade">${course.previous_grade}</span> → <span class="grade-change">${course.grade}</span>`;
                        }
                        
                        const rowClass = isNew ? 'new-grade' : '';
                        table += `<tr class="${rowClass}">
                            <td>${course.title || '未知'}</td>
                            <td>${gradeDisplay}</td>
                            <td>${course.credit || '未知'}</td>
                            <td>${course.nature || '未知'}</td>
                            <td>${course.category || '未知'}</td>
                        </tr>`;
                    });
                    table += '</tbody></table>';
                    tableEl.innerHTML = table;
                } else {
                    resultEl.className = 'result error';
                    resultEl.textContent = data.message;
                    tableEl.innerHTML = '';
                }
            } catch (err) {
                resultEl.className = 'result error';
                resultEl.textContent = '请求失败：' + err.message;
                tableEl.innerHTML = '';
            }
        });

        // 启动监测
        document.getElementById('startMonitorBtn').addEventListener('click', async () => {
            const { username, password } = getAccountData();
            if (!username || !password) {
                alert('请先填写教务系统账号和密码');
                return;
            }

            const email = document.getElementById('monitor_email').value;
            const formData = new FormData();
            formData.append('jw_username', username);
            formData.append('jw_password', password);
            if (email) {
                formData.append('email', email);
            }

            const resultEl = document.getElementById('monitorResult');
            
            try {
                const res = await fetch('/grade/api/start_monitoring', {
                    method: 'POST',
                    body: formData
                });
                
                // 检查响应状态
                if (!res.ok) {
                    throw new Error(`HTTP错误: ${res.status}`);
                }
                
                const data = await res.json();
                
                if (data.success) {
                    resultEl.className = 'result success';
                    resultEl.textContent = data.message;
                } else {
                    resultEl.className = 'result error';
                    resultEl.textContent = data.message;
                }
                // 更新状态
                loadMonitorStatus();
            } catch (err) {
                resultEl.className = 'result error';
                resultEl.textContent = '请求失败：' + err.message;
            }
        });

        // 停止监测
        document.getElementById('stopMonitorBtn').addEventListener('click', async () => {
            const email = document.getElementById('monitor_email').value;
            if (!email) {
                alert('请填写通知邮箱');
                return;
            }

            const formData = new FormData();
            formData.append('email', email);

            const resultEl = document.getElementById('monitorResult');
            
            try {
                const res = await fetch('/grade/api/stop_monitoring', {
                    method: 'POST',
                    body: formData
                });
                
                // 检查响应状态
                if (!res.ok) {
                    throw new Error(`HTTP错误: ${res.status}`);
                }
                
                const data = await res.json();
                
                if (data.success) {
                    resultEl.className = 'result success';
                    resultEl.textContent = data.message;
                } else {
                    resultEl.className = 'result error';
                    resultEl.textContent = data.message;
                }
                // 更新状态
                loadMonitorStatus();
            } catch (err) {
                resultEl.className = 'result error';
                resultEl.textContent = '请求失败：' + err.message;
            }
        });

        // 下载个人课程表
        document.getElementById('downloadScheduleBtn').addEventListener('click', async () => {
            const { username, password } = getAccountData();
            if (!username || !password) {
                alert('请先填写教务系统账号和密码');
                return;
            }

            // 固定学年学期：2025-2026第2学期
            const year = 2025;
            const term = 2;

            const formData = new FormData();
            formData.append('jw_username', username);
            formData.append('jw_password', password);
            formData.append('year', year);
            formData.append('term', term);

            const resultEl = document.getElementById('gradesResult');
            
            try {
                const res = await fetch('/grade/api/download_schedule', {
                    method: 'POST',
                    body: formData
                });
                
                // 检查响应状态
                if (!res.ok) {
                    const errorData = await res.json().catch(() => ({
                        message: `HTTP错误: ${res.status}`
                    }));
                    throw new Error(errorData.message);
                }
                
                // 获取PDF内容
                const pdfBlob = await res.blob();
                
                // 验证PDF文件
                console.log(`PDF文件大小: ${pdfBlob.size}字节`);
                console.log(`PDF文件类型: ${pdfBlob.type}`);
                
                // 降低验证阈值，允许更小的PDF文件
                if (pdfBlob.size < 200) {
                    throw new Error('下载的PDF文件内容不完整或损坏');
                }
                
                // 允许更多的内容类型，因为教务系统可能返回不同的MIME类型
                if (!pdfBlob.type.includes('pdf') && !pdfBlob.type.includes('application/octet-stream')) {
                    console.warn('PDF文件类型不是标准的PDF格式，尝试下载');
                    // 不直接抛出错误，而是尝试下载
                }
                
                // 创建下载链接
                const url = window.URL.createObjectURL(pdfBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${username}(${year}-${year + 1}-${term})课表.pdf`;
                document.body.appendChild(a);
                a.click();
                
                // 延迟清理资源，确保下载完成
                setTimeout(() => {
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                }, 1000);
                
                resultEl.className = 'result success';
                resultEl.textContent = '课程表下载成功！';
                
                // 保存账号信息并隐藏输入框
                savedAccount = { username, password };
                hideAccountInputs();
            } catch (err) {
                resultEl.className = 'result error';
                resultEl.textContent = '下载失败：' + err.message;
            }
        });

        // 加载监测状态
        async function loadMonitorStatus() {
            const statusEl = document.getElementById('monitorStatus');
            try {
                const res = await fetch('/grade/api/monitoring_status');
                const data = await res.json();
                
                if (data.success) {
                    if (data.tasks.length > 0) {
                        let html = '<ul>';
                        data.tasks.forEach(task => {
                            html += `<li>监测中：${task.username}（通知邮箱：${task.email}）</li>`;
                        });
                        html += '</ul>';
                        statusEl.innerHTML = html;
                    } else {
                        statusEl.textContent = '暂无活跃的监测任务';
                    }
                } else {
                    statusEl.textContent = '获取状态失败：' + data.message;
                }
            } catch (err) {
                statusEl.textContent = '获取状态失败：' + err.message;
            }
        }

        // 页面加载时获取状态
        window.onload = loadMonitorStatus;
    </script>
</body>
</html>
